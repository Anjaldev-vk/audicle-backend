
services:
  # The Entry Point (API Gateway)
  gateway:
    image: nginx:latest
    container_name: audicle_gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - ai_service
    networks:
      - audicle_network

  # Database Service
  db:
    image: pgvector/pgvector:pg15
    container_name: audicle_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audicle_network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: audicle_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audicle_network

  # Django Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audicle_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    # Ports removed as Gateway handles external traffic
    env_file:
      - .env
    environment:
      - DEBUG=1
      - AI_BACKEND=${AI_BACKEND}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - audicle_network

  # Celery Worker — processes async tasks (email, transcription, etc.)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audicle_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - audicle_network

  # Celery Beat — periodic task scheduler (OTP cleanup, monthly reset)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audicle_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - audicle_network

  # FastAPI AI Service (Web API)
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: audicle_aiservice
    volumes:
      - ./ai_service:/app
      - media_files:/app/media:ro 
    networks:
      - audicle_network

  # AI Worker Service (Background Processor)
  ai_worker:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: audicle_aiworker
    command: python worker.py
    volumes:
      - ./ai_service:/app
      - media_files:/app/media:ro # Access files to transcribe
    depends_on:
      - kafka
    networks:
      - audicle_network
    environment:
        - KAFKA_BROKER=kafka:9092
        - KAFKA_GROUP=ai-service-group
        - KAFKA_TOPIC=transcription_tasks
        - DJANGO_INTERNAL_URL=http://backend:8000
        - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
        - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
        - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
        - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
        - AWS_S3_REGION=${AWS_S3_REGION}
        - AI_BACKEND=${AI_BACKEND}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - GEMINI_MODEL=${GEMINI_MODEL}
        - OPENAI_API_KEY=${OPENAI_API_KEY}
        - OPENAI_MODEL=${OPENAI_MODEL}
        - SUMMARIZATION_TOPIC=summarization_tasks

  zookeeper:
    image: zookeeper:3.9
    container_name: audicle_zookeeper
    restart: always
    environment:
      ZOO_MY_ID: 1
    networks:
      - audicle_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: audicle_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - audicle_network

networks:
  audicle_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files: