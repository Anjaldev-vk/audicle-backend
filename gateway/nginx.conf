events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        # ── CORS preflight only ─────────────────────────────────────────
        # Nginx intercepts OPTIONS requests and replies directly so the
        # browser's preflight succeeds without reaching the upstream.
        # For all real (non-OPTIONS) requests, Django's CorsMiddleware
        # is the sole source of Access-Control-* headers — Nginx must
        # NOT add them again or the browser gets duplicate values.
        set $cors_origin "";
        if ($http_origin ~* "^http://(localhost|127\.0\.0\.1)(:\d+)?$") {
            set $cors_origin $http_origin;
        }

        # Static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # AI Service
        location /api/v1/ai/ {
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-CSRFToken" always;
                add_header Access-Control-Max-Age           3600 always;
                return 204;
            }

            proxy_pass http://ai_service:8001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route: handles /admin/, /api/docs/, and /api/v1/accounts/
        location / {
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-CSRFToken, X-Workspace-ID" always;
                add_header Access-Control-Max-Age           3600 always;
                return 204;
            }

            proxy_pass http://backend:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}

