openapi: 3.0.3
info:
  title: Audicle API
  version: 1.0.0
  description: API documentation for Audicle backend
paths:
  /api/v1/accounts/change-password/:
    post:
      operationId: v1_accounts_change_password_create
      tags:
      - Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/accounts/invite/{code}/:
    get:
      operationId: v1_accounts_invite_retrieve
      parameters:
      - in: path
        name: code
        schema:
          type: string
        required: true
      tags:
      - Organisation
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  organisation:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
          description: ''
  /api/v1/accounts/login/:
    post:
      operationId: v1_accounts_login_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/login/google/:
    post:
      operationId: v1_accounts_login_google_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/logout/:
    post:
      operationId: v1_accounts_logout_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/accounts/me/:
    get:
      operationId: v1_accounts_me_retrieve
      tags:
      - Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: v1_accounts_me_partial_update
      tags:
      - Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/organisation/:
    get:
      operationId: v1_accounts_organisation_retrieve
      tags:
      - Organisation
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
          description: ''
    patch:
      operationId: v1_accounts_organisation_partial_update
      tags:
      - Organisation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrganisation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrganisation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrganisation'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
          description: ''
  /api/v1/accounts/organisation/invite/:
    post:
      operationId: v1_accounts_organisation_invite_create
      tags:
      - Organisation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateInvite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateInvite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
          description: ''
  /api/v1/accounts/organisation/members/:
    get:
      operationId: v1_accounts_organisation_members_list
      tags:
      - Organisation
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/organisation/members/{user_id}/remove/:
    delete:
      operationId: v1_accounts_organisation_members_remove_destroy
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organisation
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/accounts/password-reset/confirm/:
    post:
      operationId: v1_accounts_password_reset_confirm_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                otp:
                  type: string
                new_password:
                  type: string
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/accounts/password-reset/request/:
    post:
      operationId: v1_accounts_password_reset_request_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/accounts/register/:
    post:
      operationId: v1_accounts_register_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/token/refresh/:
    post:
      operationId: v1_accounts_token_refresh_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    AccountTypeEnum:
      enum:
      - individual
      - create_org
      - join_org
      type: string
      description: |-
        * `individual` - individual
        * `create_org` - create_org
        * `join_org` - join_org
    BlankEnum:
      enum:
      - ''
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - new_password
      - old_password
    CreateInvite:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: member
      required:
      - email
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    NullEnum:
      enum:
      - null
    OrgRoleEnum:
      enum:
      - owner
      - admin
      - member
      type: string
      description: |-
        * `owner` - Owner
        * `admin` - Admin
        * `member` - Member
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          description: URL-safe unique identifier for the organisation.
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        plan:
          allOf:
          - $ref: '#/components/schemas/PlanEnum'
          description: |-
            Current subscription plan.

            * `free` - Free
            * `pro` - Pro
            * `enterprise` - Enterprise
        logo_url:
          type: string
          format: uri
          maxLength: 500
      required:
      - id
      - name
      - slug
    PatchedOrganisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          description: URL-safe unique identifier for the organisation.
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        plan:
          allOf:
          - $ref: '#/components/schemas/PlanEnum'
          description: |-
            Current subscription plan.

            * `free` - Free
            * `pro` - Pro
            * `enterprise` - Enterprise
        logo_url:
          type: string
          format: uri
          maxLength: 500
    PatchedUpdateProfile:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        phone_number:
          type: string
          maxLength: 20
        job_title:
          type: string
          maxLength: 100
        timezone:
          type: string
          maxLength: 50
        avatar_url:
          type: string
          format: uri
          maxLength: 500
        email_notifications:
          type: boolean
        meeting_reminders:
          type: boolean
    PlanEnum:
      enum:
      - free
      - pro
      - enterprise
      type: string
      description: |-
        * `free` - Free
        * `pro` - Pro
        * `enterprise` - Enterprise
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
        confirm_password:
          type: string
          writeOnly: true
        account_type:
          allOf:
          - $ref: '#/components/schemas/AccountTypeEnum'
          default: individual
        org_name:
          type: string
          maxLength: 255
        org_slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        invite_code:
          type: string
          maxLength: 100
      required:
      - confirm_password
      - email
      - first_name
      - last_name
      - password
    RoleEnum:
      enum:
      - owner
      - admin
      - member
      type: string
      description: |-
        * `owner` - Owner
        * `admin` - Admin
        * `member` - Member
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 20
        job_title:
          type: string
          maxLength: 100
        timezone:
          type: string
          maxLength: 50
        avatar_url:
          type: string
          format: uri
          maxLength: 500
        email_notifications:
          type: boolean
        meeting_reminders:
          type: boolean
        is_verified:
          type: boolean
          readOnly: true
        organisation:
          allOf:
          - $ref: '#/components/schemas/Organisation'
          readOnly: true
        org_role:
          nullable: true
          description: |-
            Must be set when organisation is set. Must be null when organisation is null.

            * `owner` - Owner
            * `admin` - Admin
            * `member` - Member
          oneOf:
          - $ref: '#/components/schemas/OrgRoleEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        account_type:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_type
      - created_at
      - email
      - first_name
      - full_name
      - id
      - is_verified
      - last_name
      - organisation
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
