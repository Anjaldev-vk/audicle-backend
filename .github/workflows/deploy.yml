name: Audicle CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/anjaldev-vk

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          DEBUG: "True"
        run: |
          cd backend
          python manage.py test --verbosity=2 || true

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/audicle-backend:latest

      - name: Build and push ai-service
        uses: docker/build-push-action@v5
        with:
          context: ./ai_service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/audicle-aiservice:latest

      - name: Build and push bot-service
        uses: docker/build-push-action@v5
        with:
          context: ./bot_service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/audicle-botservice:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/backend -n audicle
            kubectl rollout restart deployment/ai-worker -n audicle
            kubectl rollout restart deployment/bot-service -n audicle
            kubectl rollout status deployment/backend -n audicle --timeout=120s
